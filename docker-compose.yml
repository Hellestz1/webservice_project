services:
  db:
    image: postgres:16
    container_name: comic-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: comic_provider
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d comic_provider"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrate:
    image: postgres:16
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: postgres
    volumes:
      - ./database:/sql:ro
    entrypoint:
      ["psql", "-h", "db", "-p", "5432", "-U", "postgres", "-d", "comic_provider", "-f", "/sql/001_init_postgres.sql"]
    restart: "no"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      APP_PORT: 8080
      DB_DSN: postgres://postgres:postgres@db:5432/comic_provider?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: a@a.a
      PGADMIN_DEFAULT_PASSWORD: a
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
